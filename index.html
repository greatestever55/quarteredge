<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuarterEdge — NBA Quarter Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --surface2: #141820;
    --border: #1e2433;
    --accent: #f0b429;
    --accent2: #e85d04;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #f0f2f7;
    --muted: #5a6480;
    --subtle: #2a3042;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 760px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  header { padding: 48px 0 36px; animation: fadeDown 0.6s ease both; }

  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: #000; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }
  .tagline { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-left: 48px; }

  /* Form */
  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 16px; animation: fadeUp 0.6s ease 0.1s both; }

  .section-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; }
  .form-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; display: block; }

  input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 12px 14px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; width: 100%;
  }
  input::placeholder { color: var(--muted); font-size: 12px; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,180,41,0.1); }

  /* Market toggles */
  .markets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

  .market-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .market-card.active { border-color: var(--accent); background: rgba(240,180,41,0.05); }
  .market-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .market-name { font-size: 11px; letter-spacing: 0.5px; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 600; }
  .market-toggle { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.2s; }
  .market-card.active .market-toggle { background: var(--accent); border-color: var(--accent); color: #000; }

  .market-inputs { display: none; gap: 8px; }
  .market-card.active .market-inputs { display: flex; }
  .market-input-group { flex: 1; }
  .market-input-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; display: block; }
  .market-input { padding: 9px 10px; font-size: 12px; border-radius: 7px; }

  .analyze-btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 15px; letter-spacing: 0.5px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .analyze-btn:hover { background: #f5c842; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,180,41,0.25); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }

  /* Results */
  #results { animation: fadeUp 0.5s ease both; }

  /* Matchup header */
  .matchup-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 24px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .matchup-teams { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: -0.3px; }
  .matchup-vs { color: var(--muted); font-size: 12px; margin: 0 8px; }
  .matchup-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-chip { font-size: 10px; padding: 4px 10px; border-radius: 4px; letter-spacing: 0.5px; }
  .chip-games { background: rgba(240,180,41,0.1); color: var(--accent); border: 1px solid rgba(240,180,41,0.2); }
  .chip-blowout { background: rgba(239,68,68,0.08); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  /* Team breakdown */
  .team-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 24px; margin-bottom: 14px;
  }
  .team-bar-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .team-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .team-row:last-child { margin-bottom: 0; }
  .team-name { font-size: 13px; color: var(--text); min-width: 180px; }
  .team-stats { display: flex; gap: 20px; }
  .ts { text-align: right; }
  .ts-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--accent); }
  .ts-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  /* Consistency */
  .consistency-row { display: flex; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .cons-item { flex: 1; background: var(--surface2); border-radius: 8px; padding: 12px; }
  .cons-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .cons-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .cons-note { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* Market result cards */
  .market-result {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 14px;
  }

  .mr-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .mr-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .mr-subtitle { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

  .verdict-badge { padding: 8px 16px; border-radius: 7px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; white-space: nowrap; }
  .vb-bet { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .vb-skip { background: rgba(239,68,68,0.08); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

  /* Stats row */
  .mr-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .mr-stat { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
  .mr-stat-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; line-height: 1; }
  .mr-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* EV section */
  .ev-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .ev-item { flex: 1; border-radius: 8px; padding: 12px 14px; }
  .ev-positive { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); }
  .ev-negative { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.15); }
  .ev-neutral { background: var(--surface2); border: 1px solid var(--border); }
  .ev-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .ev-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }

  /* Progress bar */
  .progress-section { margin-bottom: 16px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .progress-pct { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -1px; }
  .progress-track { height: 5px; background: var(--subtle); border-radius: 999px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width 1s cubic-bezier(0.4,0,0.2,1); width: 0%; }
  .pf-green { background: var(--green); }
  .pf-red { background: var(--red); }
  .pf-amber { background: var(--accent); }
  .progress-note { font-size: 10px; color: var(--muted); }

  /* History dots */
  .history-dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .hdot { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .hdot-circle { width: 38px; height: 38px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px; }
  .hdot-over { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.25); color: var(--green); }
  .hdot-under { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.18); color: var(--red); }
  .hdot-lbl { font-size: 8px; color: var(--muted); }

  /* Error */
  .error-card { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 16px 20px; color: var(--red); font-size: 12px; }

  footer { padding: 28px 0 48px; text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  footer span { color: var(--accent); }

  .hidden { display: none !important; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .markets-grid { grid-template-columns: 1fr; }
    .mr-stats { grid-template-columns: 1fr 1fr; }
    .matchup-bar { flex-direction: column; }
    .team-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    .consistency-row { flex-direction: column; }
    .ev-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">QE</div>
      <div class="logo-text">Quarter<span>Edge</span></div>
    </div>
    <div class="tagline">NBA Quarter Analytics — Multi-Market</div>
  </header>

  <!-- Input Form -->
  <div class="form-section">
    <div class="section-title">Teams</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Home Team</label>
        <input type="text" id="homeTeam" placeholder="e.g. Lakers" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label">Away Team</label>
        <input type="text" id="awayTeam" placeholder="e.g. Celtics" autocomplete="off" />
      </div>
    </div>

    <div class="section-title">Markets — tap to activate</div>
    <div class="markets-grid" id="marketsGrid">

      <div class="market-card" id="mc-hsq" onclick="toggleMarket('hsq')">
        <div class="market-card-header">
          <div class="market-name">Highest Scoring Q</div>
          <div class="market-toggle" id="mt-hsq">+</div>
        </div>
        <div class="market-inputs" id="mi-hsq">
          <div class="market-input-group">
            <label class="market-input-label">Line</label>
            <input type="number" class="market-input" id="hsq_line" placeholder="62.5" step="0.5" onclick="e=>e.stopPropagation()" />
          </div>
          <div class="market-input-group">
            <label class="market-input-label">Odds</label>
            <input type="number" class="market-input" id="hsq_odds" placeholder="1.92" step="0.01" onclick="e=>e.stopPropagation()" />
          </div>
        </div>
      </div>

      <div class="market-card" id="mc-lsq" onclick="toggleMarket('lsq')">
        <div class="market-card-header">
          <div class="market-name">Lowest Scoring Q</div>
          <div class="market-toggle" id="mt-lsq">+</div>
        </div>
        <div class="market-inputs" id="mi-lsq">
          <div class="market-input-group">
            <label class="market-input-label">Line</label>
            <input type="number" class="market-input" id="lsq_line" placeholder="22.5" step="0.5" onclick="e=>e.stopPropagation()" />
          </div>
          <div class="market-input-group">
            <label class="market-input-label">Odds</label>
            <input type="number" class="market-input" id="lsq_odds" placeholder="1.85" step="0.01" onclick="e=>e.stopPropagation()" />
          </div>
        </div>
      </div>

      <div class="market-card" id="mc-q1" onclick="toggleMarket('q1')">
        <div class="market-card-header">
          <div class="market-name">1st Quarter O/U</div>
          <div class="market-toggle" id="mt-q1">+</div>
        </div>
        <div class="market-inputs" id="mi-q1">
          <div class="market-input-group">
            <label class="market-input-label">Line</label>
            <input type="number" class="market-input" id="q1_line" placeholder="28.5" step="0.5" onclick="e=>e.stopPropagation()" />
          </div>
          <div class="market-input-group">
            <label class="market-input-label">Odds</label>
            <input type="number" class="market-input" id="q1_odds" placeholder="1.90" step="0.01" onclick="e=>e.stopPropagation()" />
          </div>
        </div>
      </div>

      <div class="market-card" id="mc-h1" onclick="toggleMarket('h1')">
        <div class="market-card-header">
          <div class="market-name">1st Half O/U</div>
          <div class="market-toggle" id="mt-h1">+</div>
        </div>
        <div class="market-inputs" id="mi-h1">
          <div class="market-input-group">
            <label class="market-input-label">Line</label>
            <input type="number" class="market-input" id="h1_line" placeholder="115.5" step="0.5" onclick="e=>e.stopPropagation()" />
          </div>
          <div class="market-input-group">
            <label class="market-input-label">Odds</label>
            <input type="number" class="market-input" id="h1_odds" placeholder="1.88" step="0.01" onclick="e=>e.stopPropagation()" />
          </div>
        </div>
      </div>

      <div class="market-card" id="mc-total" onclick="toggleMarket('total')">
        <div class="market-card-header">
          <div class="market-name">Total O/U (incl. OT)</div>
          <div class="market-toggle" id="mt-total">+</div>
        </div>
        <div class="market-inputs" id="mi-total">
          <div class="market-input-group">
            <label class="market-input-label">Line</label>
            <input type="number" class="market-input" id="total_line" placeholder="228.5" step="0.5" onclick="e=>e.stopPropagation()" />
          </div>
          <div class="market-input-group">
            <label class="market-input-label">Odds</label>
            <input type="number" class="market-input" id="total_odds" placeholder="1.90" step="0.01" onclick="e=>e.stopPropagation()" />
          </div>
        </div>
      </div>

    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Analyze Matchup</span>
    </button>
  </div>

  <div id="results" class="hidden"></div>

  <footer>Powered by <span>QuarterEdge</span> · Real NBA data · Blowout filtered · 2025-26 season</footer>
</div>

<script>
const API = 'https://quarteredge-api.onrender.com';
const activeMarkets = new Set();

function toggleMarket(key) {
  const card = document.getElementById('mc-' + key);
  const toggle = document.getElementById('mt-' + key);
  if (activeMarkets.has(key)) {
    activeMarkets.delete(key);
    card.classList.remove('active');
    toggle.textContent = '+';
  } else {
    activeMarkets.add(key);
    card.classList.add('active');
    toggle.textContent = '✓';
  }
}

function setLoading(on) {
  document.getElementById('analyzeBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnText').textContent = on ? 'Analyzing...' : 'Analyze Matchup';
}

function showError(msg) {
  const el = document.getElementById('results');
  el.innerHTML = `<div class="error-card">⚠ ${msg}</div>`;
  el.classList.remove('hidden');
}

async function analyze() {
  const home = document.getElementById('homeTeam').value.trim();
  const away = document.getElementById('awayTeam').value.trim();
  if (!home || !away) { showError('Please enter both team names.'); return; }
  if (activeMarkets.size === 0) { showError('Please activate at least one market.'); return; }

  // Build query params
  const params = new URLSearchParams();
  for (const key of activeMarkets) {
    const line = document.getElementById(key + '_line')?.value;
    const odds = document.getElementById(key + '_odds')?.value;
    if (!line) { showError(`Please enter a line for ${key.toUpperCase()}.`); return; }
    params.append(key + '_line', line);
    if (odds) params.append(key + '_odds', odds);
  }

  setLoading(true);
  document.getElementById('results').classList.add('hidden');

  try {
    const url = `${API}/api/analyze/${encodeURIComponent(home)}/${encodeURIComponent(away)}?${params}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { showError(data.error); }
    else { renderResults(data); }
  } catch(e) {
    showError('Could not connect to QuarterEdge API. Try again.');
  }
  setLoading(false);
}

function rateColor(rate) {
  return rate >= 70 ? 'var(--green)' : rate >= 60 ? 'var(--accent)' : 'var(--red)';
}

function pfClass(rate) {
  return rate >= 70 ? 'pf-green' : rate >= 60 ? 'pf-amber' : 'pf-red';
}

function renderEV(market, fillId) {
  if (!market.odds || market.ev === null || market.ev === undefined) return '';
  const isPos = market.ev > 0;
  const evClass = isPos ? 'ev-positive' : 'ev-negative';
  const evColor = isPos ? 'var(--green)' : 'var(--red)';
  return `
    <div class="ev-row">
      <div class="ev-item ev-neutral">
        <div class="ev-label">Your Probability</div>
        <div class="ev-value" style="color:var(--accent)">${market.over_rate}%</div>
      </div>
      <div class="ev-item ev-neutral">
        <div class="ev-label">Implied Probability</div>
        <div class="ev-value">${market.implied_prob}%</div>
      </div>
      <div class="ev-item ${evClass}">
        <div class="ev-label">Expected Value</div>
        <div class="ev-value" style="color:${evColor}">${market.ev > 0 ? '+' : ''}${market.ev}%</div>
      </div>
    </div>`;
}

function renderDots(history, line, fillId) {
  const dots = history.map(h => {
    const over = h > line;
    return `<div class="hdot">
      <div class="hdot-circle ${over ? 'hdot-over' : 'hdot-under'}">${h}</div>
      <div class="hdot-lbl">${over ? 'OVER' : 'UNDR'}</div>
    </div>`;
  }).join('');
  return `<div class="history-dots">${dots}</div>`;
}

function renderMarketCard(title, subtitle, market, avgLabel, avgVal, fillId) {
  const isBet = market.recommendation === 'BET';
  const rate = market.over_rate;
  return `
    <div class="market-result">
      <div class="mr-head">
        <div>
          <div class="mr-title">${title}</div>
          <div class="mr-subtitle">${subtitle}</div>
        </div>
        <div class="verdict-badge ${isBet ? 'vb-bet' : 'vb-skip'}">${isBet ? '✓ BET' : '✕ SKIP'}</div>
      </div>
      <div class="mr-stats">
        <div class="mr-stat">
          <div class="mr-stat-val" style="color:var(--accent)">${market.line}</div>
          <div class="mr-stat-lbl">Line</div>
        </div>
        <div class="mr-stat">
          <div class="mr-stat-val" style="color:${rateColor(rate)}">${avgVal}</div>
          <div class="mr-stat-lbl">${avgLabel}</div>
        </div>
        <div class="mr-stat">
          <div class="mr-stat-val" style="color:${rateColor(rate)}">${rate}%</div>
          <div class="mr-stat-lbl">Over Rate</div>
        </div>
        <div class="mr-stat">
          <div class="mr-stat-val">${market.history.length}</div>
          <div class="mr-stat-lbl">Games</div>
        </div>
      </div>
      ${renderEV(market, fillId)}
      <div class="progress-section">
        <div class="progress-header">
          <div class="progress-label">Over Rate</div>
          <div class="progress-pct" style="color:${rateColor(rate)}">${rate}%</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${pfClass(rate)}" id="${fillId}" style="width:0%"></div>
        </div>
        <div class="progress-note">Threshold: 60% to BET · ${isBet ? rate + '% clears ✓' : rate + '% does not clear ✕'}</div>
      </div>
      ${renderDots(market.history, market.line, fillId)}
    </div>`;
}

function renderResults(d) {
  const blowoutNote = d.blowouts_excluded > 0
    ? `<span class="meta-chip chip-blowout">⚡ ${d.blowouts_excluded} blowouts excluded</span>` : '';

  let html = `
    <div class="matchup-bar">
      <div class="matchup-teams">
        ${d.home_team.split(' ').pop()}
        <span class="matchup-vs">vs</span>
        ${d.away_team.split(' ').pop()}
      </div>
      <div class="matchup-meta">
        <span class="meta-chip chip-games">${d.games_analyzed} games analyzed</span>
        ${blowoutNote}
      </div>
    </div>

    <div class="team-bar">
      <div class="team-bar-title">Team Breakdown</div>
      <div class="team-row">
        <div class="team-name">${d.home_team}</div>
        <div class="team-stats">
          <div class="ts"><div class="ts-val">${d.home_ppg}</div><div class="ts-lbl">PPG</div></div>
          <div class="ts"><div class="ts-val">${d.home_avg_peak_quarter}</div><div class="ts-lbl">Peak Q</div></div>
        </div>
      </div>
      <div class="team-row">
        <div class="team-name">${d.away_team}</div>
        <div class="team-stats">
          <div class="ts"><div class="ts-val">${d.away_ppg}</div><div class="ts-lbl">PPG</div></div>
          <div class="ts"><div class="ts-val">${d.away_avg_peak_quarter}</div><div class="ts-lbl">Peak Q</div></div>
        </div>
      </div>
      <div class="consistency-row">
        <div class="cons-item">
          <div class="cons-label">${d.home_team.split(' ').pop()} Q Consistency</div>
          <div class="cons-val" style="color:${d.home_consistency < 5 ? 'var(--green)' : d.home_consistency < 8 ? 'var(--accent)' : 'var(--red)'}">${d.home_consistency}</div>
          <div class="cons-note">${d.home_consistency < 5 ? 'Very consistent pattern' : d.home_consistency < 8 ? 'Moderate variation' : 'High noise — caution'}</div>
        </div>
        <div class="cons-item">
          <div class="cons-label">${d.away_team.split(' ').pop()} Q Consistency</div>
          <div class="cons-val" style="color:${d.away_consistency < 5 ? 'var(--green)' : d.away_consistency < 8 ? 'var(--accent)' : 'var(--red)'}">${d.away_consistency}</div>
          <div class="cons-note">${d.away_consistency < 5 ? 'Very consistent pattern' : d.away_consistency < 8 ? 'Moderate variation' : 'High noise — caution'}</div>
        </div>
      </div>
    </div>`;

  const m = d.markets;
  const fills = [];

  if (m.highest_scoring_quarter) {
    const fid = 'pf-hsq';
    fills.push({ id: fid, rate: m.highest_scoring_quarter.over_rate });
    html += renderMarketCard('Highest Scoring Quarter', 'Over/Under · Combined', m.highest_scoring_quarter, 'Avg Peak', m.highest_scoring_quarter.avg_combined_peak, fid);
  }
  if (m.lowest_scoring_quarter) {
    const fid = 'pf-lsq';
    fills.push({ id: fid, rate: m.lowest_scoring_quarter.over_rate });
    html += renderMarketCard('Lowest Scoring Quarter', 'Over/Under · Combined', m.lowest_scoring_quarter, 'Avg Low', m.lowest_scoring_quarter.avg_combined_low, fid);
  }
  if (m.first_quarter) {
    const fid = 'pf-q1';
    fills.push({ id: fid, rate: m.first_quarter.over_rate });
    html += renderMarketCard('1st Quarter', 'Over/Under · Combined Q1', m.first_quarter, 'Avg Q1', m.first_quarter.avg_q1, fid);
  }
  if (m.first_half) {
    const fid = 'pf-h1';
    fills.push({ id: fid, rate: m.first_half.over_rate });
    html += renderMarketCard('1st Half', 'Over/Under · Q1 + Q2', m.first_half, 'Avg H1', m.first_half.avg_h1, fid);
  }
  if (m.total) {
    const fid = 'pf-total';
    fills.push({ id: fid, rate: m.total.over_rate });
    html += renderMarketCard('Total Points (incl. OT)', 'Full Game Over/Under', m.total, 'Avg Total', m.total.avg_total, fid);
  }

  const el = document.getElementById('results');
  el.innerHTML = html;
  el.classList.remove('hidden');

  setTimeout(() => {
    fills.forEach(f => {
      const el = document.getElementById(f.id);
      if (el) el.style.width = f.rate + '%';
    });
  }, 100);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
</script>
</body>
</html>
